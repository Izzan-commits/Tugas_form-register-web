<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DISTRICT 6</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;

            /* Background gambar + overlay */
            background:
            linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
            url("foto foto/foto awal.jpg") center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== Box Login ===== */

        .login{
            width: 350px;

            background: white;

            padding: 35px;
            border-radius: 18px;

            box-shadow: 0 10px 30px rgba(0,0,0,.2);
        }

        /* ===== Judul ===== */

        .logo{
            text-align: center;
            margin-bottom: 10px;

            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;

            color: rgb(106, 4, 4);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;

            font-size: 18px;
            color: #444;
        }

        /* ===== Input ===== */

        label{
            font-size: 14px;
            font-weight: bold;
        }

        input{
            width: 100%;

            margin-top: 8px;
            margin-bottom: 18px;

            padding: 12px;

            border: 1px solid #ccc;
            border-radius: 8px;

            outline: none;
        }

        input:focus{
            border-color: rgb(106, 4, 4);
        }

        /* ===== Tombol Login ===== */

        .btn-login{
            display: block;

            text-align: center;

            background: rgb(106, 4, 4);
            color: white;

            padding: 12px;

            border-radius: 8px;

            text-decoration: none;

            transition: .3s;
        }

        .btn-login:hover{
            background: rgb(75, 2, 2);
        }

        /* ===== Text bawah ===== */

        p{
            margin-top: 18px;
            text-align: center;

            font-size: 14px;
            color: #555;
        }

        .register-link{
            color: rgb(106, 4, 4);
            text-decoration: none;
            font-weight: bold;
        }

        .register-link:hover{
            text-decoration: underline;
        }

        /* ===== Back ===== */

        .back{
            display: block;

            margin-top: 18px;

            text-align: center;

            color: #666;
            text-decoration: none;
            font-size: 13px;
        }

        .back:hover{
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="login">

        <div class="logo">DISTRICT 6</div>

        <h2>Login To Your Account</h2>

        <form>

            <label>Username</label>
            <input type="text" placeholder="Masukkan username">

            <label>Password</label>
            <input type="password" placeholder="Masukkan password">

            <a href="index.html" class="btn-login">Login</a>

            <p>
                Belum punya akun?
                <a href="register.html" class="register-link">Daftar</a>
            </p>
        </form>

    </div>

</body>
</html>
