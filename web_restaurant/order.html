<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <style>
        /* ================= FORM ORDER ================= */

        .order{
            padding: 80px 60px;
            background: #f5f5f5;
        }

        .order h2{
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
        }

        .order form{
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }

        .order label{
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #111;
        }

        .order input,
        .order select,
        .order textarea{
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;

            border: 1px solid #ddd;
            border-radius: 10px;

            font-size: 14px;
            outline: none;
            transition: .3s;
        }

        .order input:focus,
        .order select:focus,
        .order textarea:focus{
            border-color: #111;
        }

        .order textarea{
            resize: vertical;
            min-height: 120px;
        }

        .order button{
            width: 100%;
            padding: 14px;

            border: none;
            border-radius: 10px;

            background: #111;
            color: #fff;

            font-size: 15px;
            font-weight: bold;
            cursor: pointer;

            transition: .3s;
        }

        .order button:hover{
            background: #333;
        }
    </style>
</head>
<body>
    <section class="order">

        <h2>Form Order</h2>

        <form>

            <label>Nama</label><br>
            <input type="text" placeholder="Masukkan nama"><br><br>

            <label>Pilih Menu</label><br>
            <select>
            <option>Rice Bowl</option>
            <option>Grilled Chicken</option>
            <option>Beef Bowl</option>
            <option>Iced Tea</option>
            <option>Lemon Tea</option>
            <option>Iced Coffee</option>
            </select><br><br>

            <label>Jumlah Pesanan</label><br>
            <input type="number" min="1"><br><br>

            <label>Catatan</label><br>
            <textarea placeholder="Tambahkan catatan jika ada"></textarea><br><br>

            <button type="submit">Pesan Sekarang</button>

        </form>

    </section>
</body>
</html>>
